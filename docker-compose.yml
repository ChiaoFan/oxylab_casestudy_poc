services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: oxylab-casestudy-poc:latest
    container_name: oxylab-casestudy-poc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - app_output:/app/output
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  app_output:
